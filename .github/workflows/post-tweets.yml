name: Post Scheduled Tweets (Manual)

# cronはauto-post.ymlに統合済み。このワークフローは手動トリガー専用。
# 「今すぐ実行」ボタンから呼び出される。
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post tweets
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # GEMINI_API_KEY is intentionally omitted here: auto-post.py will skip
          # Part 2 (auto-schedule) when the key is absent, so only Part 1
          # (scheduled-tweets.json) runs – identical behaviour to the old
          # post-tweet.py but using the exact same code path as the cron job.
        run: python scripts/auto-post.py

      - name: Commit updated scheduled-tweets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet scheduled-tweets.json 2>/dev/null || [ ! -f scheduled-tweets.json ]; then
            echo "No changes to commit"
          else
            git add scheduled-tweets.json
            git commit -m "chore: remove posted tweets from scheduled-tweets.json [skip ci]"
            git push
          fi
