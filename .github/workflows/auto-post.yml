name: Auto Post from Schedule

on:
  # cronはGASトリガーに移行済み（15分おき・正確な実行が保証される）
  # このワークフローは緊急時の手動実行専用
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Run auto-post script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/auto-post.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=false
          if [ -f scheduled-tweets.json ] && ! git diff --quiet HEAD -- scheduled-tweets.json; then
            git add scheduled-tweets.json
            changed=true
            echo "scheduled-tweets.json changed"
          fi
          if [ -f auto-schedule.json ] && ! git diff --quiet HEAD -- auto-schedule.json; then
            git add auto-schedule.json
            changed=true
            echo "auto-schedule.json changed"
          fi
          if [ "$changed" = "true" ]; then
            git commit -m "chore: update posted status in JSON files [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
